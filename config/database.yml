default: &default
  adapter: postgresql
  pool: <%= ENV.fetch("DB_POOL_SIZE", 5) %>
  timeout: 5000

development:
  <<: *default
  url: <%= ENV.fetch("DATABASE_URL", "postgres://anava:anava@localhost:5432/anava") %>

test:
  <<: *default
  url: <%= ENV.fetch("DATABASE_URL", "postgres://anava:anava@localhost:5432/anava_test") %>

production:
  <<: *default
  url: <%= ENV.fetch("DATABASE_URL") %>
