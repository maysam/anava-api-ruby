services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: anava
      POSTGRES_PASSWORD: anava
      POSTGRES_DB: anava
    volumes:
      - anava_pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anava -d anava"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5433:5432"

  api:
    build: .
    environment:
      DATABASE_URL: postgres://anava:anava@db:5432/anava
      PORT: 8000
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/anava/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  anava_pgdata:
